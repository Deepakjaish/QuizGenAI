<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QuizGen AI</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/svg+xml" href="logo.svg">

    <script src="https://kit.fontawesome.com/8d3d2dfb6b.js" crossorigin="anonymous"></script>
</head>

<body>

<div class="background"></div>

<div class="container">

<header>

  <div class="logo">
    <img src="logo.svg" alt="QuizGen AI Logo">
</div>

<h1>
<i class="fa-solid fa-brain"></i>
QuizGen AI
</h1>

<p>
Generate AI-powered quizzes instantly using Artificial Intelligence.
</p>

</header>

<section class="card">

<div class="input-group">

<label>Quiz Topic</label>

<input
id="topic"
type="text"
placeholder="Example: Solar System"
/>
<small id="charCount">0 / 100</small>

</div>

<div class="row">

<div class="input-group">

<label>Difficulty</label>

<select id="difficulty">

<option>Easy</option>
<option selected>Medium</option>
<option>Hard</option>

</select>

</div>

<div class="input-group">

<label>Questions</label>

<select id="count">

<option>5</option>
<option selected>10</option>
<option>15</option>
<option>20</option>

</select>

</div>

</div>

<button id="generateBtn">

<i class="fa-solid fa-wand-magic-sparkles"></i>

Generate Quiz

</button>

</section>

<section class="result-card">

<div class="toolbar">

<h2>

Generated Quiz

</h2>

<div>

<button id="copyBtn">

Copy

</button>

<button id="downloadBtn">

PDF

</button>

<button id="regenerateBtn">

Regenerate

</button>

<button id="clearBtn">
Clear
</button>

</div>

</div>

<div id="loading">

Generating AI Quiz...

</div>

<div id="output"></div>

</section>

<footer>

Built with ❤️ using OpenRouter + FastAPI

</footer>

</div>

<script src="script.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>
</html>
